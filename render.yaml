services:
  - type: worker
    name: telegram-copier-bot
    env: python

    buildCommand: pip install -r requirements.txt

    startCommand: python controller_bot.py

    disk:
      name: telegram-storage
      mountPath: /opt/render/project/src/data
      sizeGB: 2

    envVars:
      - key: BOT_TOKEN
        sync: false

      - key: API_ID
        sync: false

      - key: API_HASH
        sync: false

      - key: DATA_DIR
        value: /opt/render/project/src/data
